name: Setup Project Files

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create all source files
        run: |
          mkdir -p app/src/main/java/com/lifemanager/app/data/repository
          mkdir -p app/src/main/java/com/lifemanager/app/viewmodel
          mkdir -p app/src/main/java/com/lifemanager/app/ui/screens

          cat > app/src/main/java/com/lifemanager/app/LifeManagerApp.kt << 'EOF'
          package com.lifemanager.app
          import android.app.Application
          import com.lifemanager.app.data.database.AppDatabase
          import com.lifemanager.app.data.repository.AppRepository
          class LifeManagerApp : Application() {
              val database by lazy { AppDatabase.getDatabase(this) }
              val repository by lazy { AppRepository(database.expenseDao(),database.incomeDao(),database.loanDao(),database.vehicleDao(),database.fuelDao(),database.shoppingDao(),database.addressDao(),database.reminderDao(),database.noteDao(),database.documentDao(),database.savingsDao()) }
          }
          EOF

          cat > app/src/main/java/com/lifemanager/app/viewmodel/AppViewModel.kt << 'EOF'
          package com.lifemanager.app.viewmodel
          import android.app.Application
          import androidx.lifecycle.*
          import com.lifemanager.app.LifeManagerApp
          import com.lifemanager.app.data.entities.*
          import kotlinx.coroutines.flow.SharingStarted
          import kotlinx.coroutines.flow.stateIn
          import kotlinx.coroutines.launch
          import java.util.Calendar
          class AppViewModel(application: Application) : AndroidViewModel(application) {
              private val repository = (application as LifeManagerApp).repository
              val allExpenses = repository.getAllExpenses().stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), emptyList())
              val allIncomes = repository.getAllIncomes().stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), emptyList())
              val allLoans = repository.getAllLoans().stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), emptyList())
              val allVehicles = repository.getAllVehicles().stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), emptyList())
              val allFuelEntries = repository.getAllFuelEntries().stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), emptyList())
              val allNotes = repository.getAllNotes().stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), emptyList())
              val allReminders = repository.getAllReminders().stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), emptyList())
              val allSavings = repository.getAllSavings().stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), emptyList())
              val totalSavings = repository.getTotalSavings().stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), 0.0)
              fun insertExpense(title: String, amount: Double, category: String, notes: String = "") = viewModelScope.launch { repository.insertExpense(ExpenseEntity(title=title,amount=amount,category=category,date=System.currentTimeMillis(),notes=notes)) }
              fun deleteExpense(e: ExpenseEntity) = viewModelScope.launch { repository.deleteExpense(e) }
              fun insertIncome(title: String, amount: Double, source: String, notes: String = "") = viewModelScope.launch { repository.insertIncome(IncomeEntity(title=title,amount=amount,source=source,date=System.currentTimeMillis(),notes=notes)) }
              fun deleteIncome(i: IncomeEntity) = viewModelScope.launch { repository.deleteIncome(i) }
              fun insertLoan(name: String, lenderBorrower: String, principal: Double, interestRate: Double, interestType: String, startDate: Long, dueDate: Long) = viewModelScope.launch { repository.insertLoan(LoanEntity(name=name,lenderBorrower=lenderBorrower,principal=principal,interestRate=interestRate,interestType=interestType,isCompound=false,startDate=startDate,dueDate=dueDate)) }
              fun deleteLoan(l: LoanEntity) = viewModelScope.launch { repository.deleteLoan(l) }
              fun insertVehicle(name: String, regNumber: String, fuelType: String) = viewModelScope.launch { repository.insertVehicle(VehicleEntity(name=name,registrationNumber=regNumber,fuelType=fuelType)) }
              fun deleteVehicle(v: VehicleEntity) = viewModelScope.launch { repository.deleteVehicle(v) }
              fun insertFuelEntry(vehicleId: Long, odometer: Double, quantity: Double, cost: Double, station: String = "") = viewModelScope.launch { repository.insertFuelEntry(FuelEntryEntity(vehicleId=vehicleId,date=System.currentTimeMillis(),odometer=odometer,quantity=quantity,cost=cost,station=station)) }
              fun deleteFuelEntry(f: FuelEntryEntity) = viewModelScope.launch { repository.deleteFuelEntry(f) }
              fun insertNote(title: String, content: String) = viewModelScope.launch { val now=System.currentTimeMillis(); repository.insertNote(NoteEntity(title=title,content=content,createdAt=now,updatedAt=now)) }
              fun deleteNote(n: NoteEntity) = viewModelScope.launch { repository.deleteNote(n) }
              fun insertReminder(title: String, description: String, dueDate: Long) = viewModelScope.launch { repository.insertReminder(ReminderEntity(title=title,description=description,dueDate=dueDate)) }
              fun deleteReminder(r: ReminderEntity) = viewModelScope.launch { repository.deleteReminder(r) }
              fun insertSavings(name: String, type: String, amount: Double) = viewModelScope.launch { repository.insertSavings(SavingsEntity(name=name,type=type,amount=amount,date=System.currentTimeMillis())) }
              fun deleteSavings(s: SavingsEntity) = viewModelScope.launch { repository.deleteSavings(s) }
              fun getMonthStart(): Long { val c=Calendar.getInstance(); c.set(Calendar.DAY_OF_MONTH,1); c.set(Calendar.HOUR_OF_DAY,0); c.set(Calendar.MINUTE,0); c.set(Calendar.SECOND,0); return c.timeInMillis }
              fun getMonthEnd(): Long { val c=Calendar.getInstance(); c.set(Calendar.DAY_OF_MONTH,c.getActualMaximum(Calendar.DAY_OF_MONTH)); c.set(Calendar.HOUR_OF_DAY,23); c.set(Calendar.MINUTE,59); c.set(Calendar.SECOND,59); return c.timeInMillis }
          }
          class AppViewModelFactory(private val app: Application) : ViewModelProvider.Factory {
              override fun <T : ViewModel> create(modelClass: Class<T>): T { if (modelClass.isAssignableFrom(AppViewModel::class.java)) { @Suppress("UNCHECKED_CAST") return AppViewModel(app) as T }; throw IllegalArgumentException("Unknown ViewModel") }
          }
          EOF

          cat > app/src/main/java/com/lifemanager/app/ui/screens/NotesScreen.kt << 'EOF'
          package com.lifemanager.app.ui.screens
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import androidx.lifecycle.compose.collectAsStateWithLifecycle
          import com.lifemanager.app.viewmodel.AppViewModel
          import java.text.SimpleDateFormat
          import java.util.*
          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun NotesScreen(vm: AppViewModel = viewModel()) {
              val notes by vm.allNotes.collectAsStateWithLifecycle()
              var showAdd by remember { mutableStateOf(false) }
              var search by remember { mutableStateOf("") }
              Scaffold(
                  topBar = { TopAppBar(title = { Text("Notes", fontWeight = FontWeight.Bold) }) },
                  floatingActionButton = { FloatingActionButton(onClick = { showAdd = true }) { Icon(Icons.Filled.Add, null) } }
              ) { padding ->
                  Column(Modifier.fillMaxSize().padding(padding).padding(16.dp)) {
                      OutlinedTextField(value=search, onValueChange={search=it}, modifier=Modifier.fillMaxWidth(), placeholder={Text("Search...")}, leadingIcon={Icon(Icons.Filled.Search,null)}, singleLine=true)
                      Spacer(Modifier.height(8.dp))
                      val filtered = if (search.isEmpty()) notes else notes.filter { it.title.contains(search,true) || it.content.contains(search,true) }
                      if (filtered.isEmpty()) {
                          Box(Modifier.fillMaxSize(), contentAlignment=Alignment.Center) { Text("No notes yet. Tap + to add one.", color=MaterialTheme.colorScheme.onSurfaceVariant) }
                      } else {
                          LazyColumn(verticalArrangement=Arrangement.spacedBy(8.dp)) {
                              items(filtered) { note ->
                                  Card(Modifier.fillMaxWidth()) {
                                      Row(Modifier.fillMaxWidth().padding(16.dp), horizontalArrangement=Arrangement.SpaceBetween, verticalAlignment=Alignment.CenterVertically) {
                                          Column(Modifier.weight(1f)) {
                                              Text(note.title, fontWeight=FontWeight.Bold)
                                              if (note.content.isNotEmpty()) Text(note.content, style=MaterialTheme.typography.bodySmall, maxLines=2)
                                              Text(SimpleDateFormat("dd MMM yyyy",Locale.getDefault()).format(Date(note.updatedAt)), style=MaterialTheme.typography.labelSmall, color=MaterialTheme.colorScheme.onSurfaceVariant)
                                          }
                                          IconButton(onClick={vm.deleteNote(note)}) { Icon(Icons.Filled.Delete,null,tint=MaterialTheme.colorScheme.error) }
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
              if (showAdd) {
                  var title by remember { mutableStateOf("") }
                  var content by remember { mutableStateOf("") }
                  AlertDialog(onDismissRequest={showAdd=false}, title={Text("New Note")},
                      text={ Column(verticalArrangement=Arrangement.spacedBy(8.dp)) {
                          OutlinedTextField(value=title,onValueChange={title=it},label={Text("Title")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                          OutlinedTextField(value=content,onValueChange={content=it},label={Text("Content")},modifier=Modifier.fillMaxWidth().height(150.dp))
                      }},
                      confirmButton={ Button(onClick={ if(title.isNotEmpty()){vm.insertNote(title,content);showAdd=false} }) { Text("Save") } },
                      dismissButton={ TextButton(onClick={showAdd=false}) { Text("Cancel") } }
                  )
              }
          }
          EOF

