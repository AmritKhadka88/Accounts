              Scaffold(topBar={ TopAppBar(title={Text("Life Manager",fontWeight=FontWeight.Bold)}, actions={IconButton(onClick={}){Icon(Icons.Filled.Settings,null)}}) }) { padding ->
                  LazyColumn(Modifier.fillMaxSize().padding(padding).padding(16.dp), verticalArrangement=Arrangement.spacedBy(16.dp)) {
                      item {
                          Text("Overview",style=MaterialTheme.typography.titleMedium,fontWeight=FontWeight.Bold)
                          Spacer(Modifier.height(8.dp))
                          Row(horizontalArrangement=Arrangement.spacedBy(8.dp)) {
                              SummaryCard(Modifier.weight(1f),"Income","${"%.2f".format(totalIncome)}",Icons.Filled.TrendingUp,MaterialTheme.colorScheme.primary)
                              SummaryCard(Modifier.weight(1f),"Expenses","${"%.2f".format(totalExpenses)}",Icons.Filled.TrendingDown,MaterialTheme.colorScheme.error)
                          }
                          Spacer(Modifier.height(8.dp))
                          Row(horizontalArrangement=Arrangement.spacedBy(8.dp)) {
                              SummaryCard(Modifier.weight(1f),"Savings","${"%.2f".format(savings?:0.0)}",Icons.Filled.Savings,MaterialTheme.colorScheme.tertiary)
                              SummaryCard(Modifier.weight(1f),"Loans","${"%.2f".format(totalLoans)}",Icons.Filled.AccountBalance,MaterialTheme.colorScheme.secondary)
                          }
                      }
                      item {
                          Card(Modifier.fillMaxWidth()) {
                              Column(Modifier.padding(16.dp)) {
                                  Text("Quick Add",style=MaterialTheme.typography.titleMedium,fontWeight=FontWeight.Bold)
                                  Spacer(Modifier.height(8.dp))
                                  Row(horizontalArrangement=Arrangement.spacedBy(8.dp),modifier=Modifier.fillMaxWidth()) {
                                      FilledTonalButton(onClick={showAddExpense=true},modifier=Modifier.weight(1f),contentPadding=PaddingValues(4.dp)) { Column(horizontalAlignment=Alignment.CenterHorizontally) { Icon(Icons.Filled.Remove,null,Modifier.size(20.dp)); Text("Expense",style=MaterialTheme.typography.labelSmall) } }
                                      FilledTonalButton(onClick={showAddIncome=true},modifier=Modifier.weight(1f),contentPadding=PaddingValues(4.dp)) { Column(horizontalAlignment=Alignment.CenterHorizontally) { Icon(Icons.Filled.Add,null,Modifier.size(20.dp)); Text("Income",style=MaterialTheme.typography.labelSmall) } }
                                      FilledTonalButton(onClick={},modifier=Modifier.weight(1f),contentPadding=PaddingValues(4.dp)) { Column(horizontalAlignment=Alignment.CenterHorizontally) { Icon(Icons.Filled.LocalGasStation,null,Modifier.size(20.dp)); Text("Fuel",style=MaterialTheme.typography.labelSmall) } }
                                      FilledTonalButton(onClick={showAddNote=true},modifier=Modifier.weight(1f),contentPadding=PaddingValues(4.dp)) { Column(horizontalAlignment=Alignment.CenterHorizontally) { Icon(Icons.Filled.Note,null,Modifier.size(20.dp)); Text("Note",style=MaterialTheme.typography.labelSmall) } }
                                  }
                              }
                          }
                      }
                      item {
                          Card(Modifier.fillMaxWidth()) {
                              Column(Modifier.padding(16.dp)) {
                                  Text("Recent Transactions",style=MaterialTheme.typography.titleMedium,fontWeight=FontWeight.Bold)
                                  Spacer(Modifier.height(8.dp))
                                  val recent = (expenses.map { Pair("expense",it.title) to it.amount } + incomes.map { Pair("income",it.title) to it.amount }).take(5)
                                  if (recent.isEmpty()) { Text("No transactions yet",color=MaterialTheme.colorScheme.onSurfaceVariant) }
                                  else { recent.forEach { (meta,amount) -> Row(Modifier.fillMaxWidth().padding(vertical=4.dp),horizontalArrangement=Arrangement.SpaceBetween) { Text(meta.second); Text("${"%.2f".format(amount)}",color=if(meta.first=="expense") MaterialTheme.colorScheme.error else MaterialTheme.colorScheme.primary) } } }
                              }
                          }
                      }
                      item {
                          Card(Modifier.fillMaxWidth()) {
                              Column(Modifier.padding(16.dp)) {
                                  Text("Upcoming Reminders",style=MaterialTheme.typography.titleMedium,fontWeight=FontWeight.Bold)
                                  Spacer(Modifier.height(8.dp))
                                  val upcoming = reminders.filter { it.dueDate > System.currentTimeMillis() }.take(3)
                                  if (upcoming.isEmpty()) { Text("No reminders set",color=MaterialTheme.colorScheme.onSurfaceVariant) }
                                  else { upcoming.forEach { r -> Row(Modifier.fillMaxWidth().padding(vertical=4.dp),horizontalArrangement=Arrangement.SpaceBetween) { Text(r.title); Text(SimpleDateFormat("dd MMM",Locale.getDefault()).format(Date(r.dueDate)),style=MaterialTheme.typography.bodySmall) } } }
                              }
                          }
                      }
                  }
              }
              if (showAddExpense) {
                  var title by remember { mutableStateOf("") }
                  var amount by remember { mutableStateOf("") }
                  AlertDialog(onDismissRequest={showAddExpense=false},title={Text("Add Expense")},
                      text={ Column(verticalArrangement=Arrangement.spacedBy(8.dp)) {
                          OutlinedTextField(value=title,onValueChange={title=it},label={Text("Title")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                          OutlinedTextField(value=amount,onValueChange={amount=it},label={Text("Amount")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                      }},
                      confirmButton={ Button(onClick={ val a=amount.toDoubleOrNull(); if(title.isNotEmpty()&&a!=null){vm.insertExpense(title,a,"Other");showAddExpense=false} }) { Text("Save") } },
                      dismissButton={ TextButton(onClick={showAddExpense=false}) { Text("Cancel") } }
                  )
              }
              if (showAddIncome) {
                  var title by remember { mutableStateOf("") }
                  var amount by remember { mutableStateOf("") }
                  AlertDialog(onDismissRequest={showAddIncome=false},title={Text("Add Income")},
                      text={ Column(verticalArrangement=Arrangement.spacedBy(8.dp)) {
                          OutlinedTextField(value=title,onValueChange={title=it},label={Text("Title")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                          OutlinedTextField(value=amount,onValueChange={amount=it},label={Text("Amount")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                      }},
                      confirmButton={ Button(onClick={ val a=amount.toDoubleOrNull(); if(title.isNotEmpty()&&a!=null){vm.insertIncome(title,a,"Other");showAddIncome=false} }) { Text("Save") } },
                      dismissButton={ TextButton(onClick={showAddIncome=false}) { Text("Cancel") } }
                  )
              }
              if (showAddNote) {
                  var title by remember { mutableStateOf("") }
                  var content by remember { mutableStateOf("") }
                  AlertDialog(onDismissRequest={showAddNote=false},title={Text("New Note")},
                      text={ Column(verticalArrangement=Arrangement.spacedBy(8.dp)) {
                          OutlinedTextField(value=title,onValueChange={title=it},label={Text("Title")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                          OutlinedTextField(value=content,onValueChange={content=it},label={Text("Content")},modifier=Modifier.fillMaxWidth().height(120.dp))
                      }},
                      confirmButton={ Button(onClick={ if(title.isNotEmpty()){vm.insertNote(title,content);showAddNote=false} }) { Text("Save") } },
                      dismissButton={ TextButton(onClick={showAddNote=false}) { Text("Cancel") } }
                  )
              }
          }
          @Composable
          fun SummaryCard(modifier: Modifier, title: String, value: String, icon: androidx.compose.ui.graphics.vector.ImageVector, color: androidx.compose.ui.graphics.Color) {
              Card(modifier=modifier) { Column(Modifier.padding(16.dp),verticalArrangement=Arrangement.spacedBy(4.dp)) { Icon(icon,null,tint=color); Text(title,style=MaterialTheme.typography.labelMedium); Text(value,style=MaterialTheme.typography.titleMedium,fontWeight=FontWeight.Bold) } }
          }
          EOF

          cat > app/src/main/java/com/lifemanager/app/ui/screens/VehicleScreen.kt << 'EOF'
          package com.lifemanager.app.ui.screens
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.viewmodel.compose.viewModel
          import androidx.lifecycle.compose.collectAsStateWithLifecycle
          import com.lifemanager.app.viewmodel.AppViewModel
          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun VehicleScreen(vm: AppViewModel = viewModel()) {
              val vehicles by vm.allVehicles.collectAsStateWithLifecycle()
              val fuelEntries by vm.allFuelEntries.collectAsStateWithLifecycle()
              var selectedTab by remember { mutableStateOf(0) }
              var showAddVehicle by remember { mutableStateOf(false) }
              var showAddFuel by remember { mutableStateOf(false) }
              Scaffold(topBar={ TopAppBar(title={Text("Vehicle",fontWeight=FontWeight.Bold)}) }) { padding ->
                  Column(Modifier.fillMaxSize().padding(padding)) {
                      TabRow(selectedTabIndex=selectedTab) {
                          Tab(selected=selectedTab==0,onClick={selectedTab=0},text={Text("Vehicles")})
                          Tab(selected=selectedTab==1,onClick={selectedTab=1},text={Text("Fuel Log")})
                      }
                      Box(Modifier.fillMaxSize()) {
                          when(selectedTab) {
                              0 -> {
                                  if (vehicles.isEmpty()) {
                                      Box(Modifier.fillMaxSize(),contentAlignment=Alignment.Center) { Text("No vehicles yet",color=MaterialTheme.colorScheme.onSurfaceVariant) }
                                  } else {
                                      LazyColumn(Modifier.fillMaxSize().padding(16.dp),verticalArrangement=Arrangement.spacedBy(8.dp)) {
                                          items(vehicles) { v ->
                                              Card(Modifier.fillMaxWidth()) {
                                                  Row(Modifier.fillMaxWidth().padding(16.dp),horizontalArrangement=Arrangement.SpaceBetween,verticalAlignment=Alignment.CenterVertically) {
                                                      Column(Modifier.weight(1f)) { Text(v.name,fontWeight=FontWeight.Medium); Text("${v.registrationNumber} • ${v.fuelType}",style=MaterialTheme.typography.bodySmall) }
                                                      IconButton(onClick={vm.deleteVehicle(v)}) { Icon(Icons.Filled.Delete,null,tint=MaterialTheme.colorScheme.error) }
                                                  }
                                              }
                                          }
                                      }
                                  }
                                  FloatingActionButton(onClick={showAddVehicle=true},modifier=Modifier.align(Alignment.BottomEnd).padding(16.dp)) { Icon(Icons.Filled.Add,null) }
                              }
                              1 -> {
                                  if (fuelEntries.isEmpty()) {
                                      Box(Modifier.fillMaxSize(),contentAlignment=Alignment.Center) { Text("No fuel entries yet",color=MaterialTheme.colorScheme.onSurfaceVariant) }
                                  } else {
                                      LazyColumn(Modifier.fillMaxSize().padding(16.dp),verticalArrangement=Arrangement.spacedBy(8.dp)) {
                                          item { Card(Modifier.fillMaxWidth()) { Row(Modifier.fillMaxWidth().padding(16.dp),horizontalArrangement=Arrangement.SpaceBetween) { Column { Text("Total Fuel",style=MaterialTheme.typography.labelSmall); Text("${"%.1f".format(fuelEntries.sumOf{it.quantity})} L",fontWeight=FontWeight.Bold) }; Column { Text("Total Cost",style=MaterialTheme.typography.labelSmall); Text("${"%.2f".format(fuelEntries.sumOf{it.cost})}",fontWeight=FontWeight.Bold) } } } }
                                          items(fuelEntries) { f ->
                                              Card(Modifier.fillMaxWidth()) {
                                                  Row(Modifier.fillMaxWidth().padding(16.dp),horizontalArrangement=Arrangement.SpaceBetween,verticalAlignment=Alignment.CenterVertically) {
                                                      Column(Modifier.weight(1f)) { Text("${f.quantity}L @ ${f.station.ifEmpty{"Unknown station"}}",fontWeight=FontWeight.Medium); Text("Odometer: ${f.odometer}km",style=MaterialTheme.typography.bodySmall) }
                                                      Text("${"%.2f".format(f.cost)}",fontWeight=FontWeight.Bold)
                                                      IconButton(onClick={vm.deleteFuelEntry(f)}) { Icon(Icons.Filled.Delete,null,tint=MaterialTheme.colorScheme.error) }
                                                  }
                                              }
                                          }
                                      }
                                  }
                                  FloatingActionButton(onClick={showAddFuel=true},modifier=Modifier.align(Alignment.BottomEnd).padding(16.dp)) { Icon(Icons.Filled.Add,null) }
                              }
                          }
                      }
                  }
              }
              if (showAddVehicle) {
                  var name by remember { mutableStateOf("") }
                  var reg by remember { mutableStateOf("") }
                  var fuel by remember { mutableStateOf("Petrol") }
                  AlertDialog(onDismissRequest={showAddVehicle=false},title={Text("Add Vehicle")},
                      text={ Column(verticalArrangement=Arrangement.spacedBy(8.dp)) {
                          OutlinedTextField(value=name,onValueChange={name=it},label={Text("Vehicle Name")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                          OutlinedTextField(value=reg,onValueChange={reg=it},label={Text("Registration Number")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                          OutlinedTextField(value=fuel,onValueChange={fuel=it},label={Text("Fuel Type")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                      }},
                      confirmButton={ Button(onClick={ if(name.isNotEmpty()){vm.insertVehicle(name,reg,fuel);showAddVehicle=false} }) { Text("Save") } },
                      dismissButton={ TextButton(onClick={showAddVehicle=false}) { Text("Cancel") } }
                  )
              }
              if (showAddFuel && vehicles.isNotEmpty()) {
                  var odometer by remember { mutableStateOf("") }
                  var quantity by remember { mutableStateOf("") }
                  var cost by remember { mutableStateOf("") }
                  var station by remember { mutableStateOf("") }
                  AlertDialog(onDismissRequest={showAddFuel=false},title={Text("Add Fuel Entry")},
                      text={ Column(verticalArrangement=Arrangement.spacedBy(8.dp)) {
                          OutlinedTextField(value=odometer,onValueChange={odometer=it},label={Text("Odometer (km)")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                          OutlinedTextField(value=quantity,onValueChange={quantity=it},label={Text("Quantity (L)")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                          OutlinedTextField(value=cost,onValueChange={cost=it},label={Text("Cost")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                          OutlinedTextField(value=station,onValueChange={station=it},label={Text("Station (optional)")},modifier=Modifier.fillMaxWidth(),singleLine=true)
                      }},
                      confirmButton={ Button(onClick={ val o=odometer.toDoubleOrNull();val q=quantity.toDoubleOrNull();val c=cost.toDoubleOrNull(); if(o!=null&&q!=null&&c!=null){vm.insertFuelEntry(vehicles[0].id,o,q,c,station);showAddFuel=false} }) { Text("Save") } },
                      dismissButton={ TextButton(onClick={showAddFuel=false}) { Text("Cancel") } }
                  )
              }
          }
          EOF

